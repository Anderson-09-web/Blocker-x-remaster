services:
  # Single service: the API server also serves the built frontend as static
  # files (Blocker-X/artifacts/api-server/src/app.ts supports this in
  # production). Frontend and API MUST share one domain — Render's
  # onrender.com subdomains are on the public suffix list, so two separate
  # onrender.com services count as different "sites" to the browser and it
  # silently drops the session cookie as third-party, breaking login.
  - type: web
    name: blocker-x-api
    runtime: node
    plan: free
    region: oregon
    # rootDir points to the Blocker-X subdirectory, which contains the full
    # pnpm workspace (artifacts/api-server + artifacts/blockerx).
    rootDir: Blocker-X
    buildCommand: pnpm install --frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/blockerx run build && pnpm --filter @workspace/api-server run build
    # NOTE: the heap cap is applied only to the running server via this flag,
    # NOT via a NODE_OPTIONS env var — an env var would also apply to the
    # build step above (vite build needs more than 192MB to bundle and will
    # OOM/exit 134 if capped that low).
    startCommand: node --max-old-space-size=192 artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      # Frontend and API are served from the same root path here.
      - key: BASE_PATH
        value: "/"
      # PORT is injected automatically by Render — do not set it manually.
      - key: NEON_DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: CF_R2_ACCOUNT_ID
        sync: false
      - key: CF_R2_ACCESS_KEY_ID
        sync: false
      - key: CF_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CF_R2_BUCKET_NAME
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DISCORD_OWNER_ID
        sync: false
