services:
  # Single service: the API server also serves the built frontend as static
  # files (artifacts/api-server/src/app.ts already supports this in
  # production). Frontend and API MUST share one domain — Render's
  # onrender.com subdomains are on the public suffix list, so two separate
  # onrender.com services count as different "sites" to the browser and it
  # silently drops the session cookie as third-party, breaking login.
  - type: web
    name: blocker-x-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/blockerx run build && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      # Frontend and API are served from the same root path here.
      - key: BASE_PATH
        value: "/"
      # Cap the API server's own JS heap so it can't creep up and starve the
      # Discord bot child processes it spawns — they all share the same
      # 512 MB free-tier container. Leaves ~300 MB for bots + OS overhead.
      - key: NODE_OPTIONS
        value: "--max-old-space-size=192"
      # PORT is injected automatically by Render — do not set it manually.
      - key: NEON_DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: CF_R2_ACCOUNT_ID
        sync: false
      - key: CF_R2_ACCESS_KEY_ID
        sync: false
      - key: CF_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CF_R2_BUCKET_NAME
        sync: false
      - key: GROQ_API_KEY
        sync: false
