services:
  # ── Backend: API Server + bot process host ────────────────────────────
  - type: web
    name: blocker-x-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      # Cap the API server's own JS heap so it can't creep up and starve the
      # Discord bot child processes it spawns — they all share the same
      # 512 MB free-tier container. Leaves ~300 MB for bots + OS overhead.
      - key: NODE_OPTIONS
        value: "--max-old-space-size=192"
      # PORT is injected automatically by Render — do not set it manually.
      - key: NEON_DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: CF_R2_ACCOUNT_ID
        sync: false
      - key: CF_R2_ACCESS_KEY_ID
        sync: false
      - key: CF_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CF_R2_BUCKET_NAME
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # ── Frontend: static site (no RAM cost, doesn't share the API's 512 MB) ─
  - type: web
    name: blocker-x-web
    runtime: static
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/blockerx run build
    staticPublishPath: artifacts/blockerx/dist/public
    envVars:
      - key: BASE_PATH
        value: "/"
      - key: PORT
        value: "3000"
      # Set this once you know the API service's Render URL, e.g.
      # https://blocker-x-api.onrender.com — required at build time.
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
