services:
  - type: web
    name: blockerx-api
    runtime: node
    plan: starter
    buildCommand: pnpm install && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEON_DATABASE_URL
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: CF_R2_ACCOUNT_ID
        sync: false
      - key: CF_R2_ACCESS_KEY_ID
        sync: false
      - key: CF_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CF_R2_BUCKET_NAME
        sync: false
      - key: CF_R2_ENDPOINT
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: RENDER_APP_URL
        sync: false
      - key: RENDER_API_URL
        sync: false

  - type: web
    name: blockerx-frontend
    runtime: static
    buildCommand: BASE_PATH=/ pnpm install && BASE_PATH=/ pnpm --filter @workspace/blockerx run build
    staticPublishPath: artifacts/blockerx/dist/public
    envVars:
      - key: VITE_API_URL
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
